<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wool-Search | {{ query if query else 'Privacy First' }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-black text-indigo-600 mb-6">🐑 Wool-Search</h1>
            <form action="/search" method="post" class="relative max-w-2xl mx-auto">
                <input type="text" name="q" value="{{ query }}" 
                       class="w-full p-4 pl-6 pr-24 rounded-full border border-slate-200 shadow-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition"
                       placeholder="キーワード、または !yt !gh で検索..." required autofocus>
                <button type="submit" class="absolute right-2 top-2 bottom-2 px-6 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition font-bold">
                    検索
                </button>
            </form>
        </header>

        {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-lg mb-8 border border-red-100 text-center">
                {{ error }}
            </div>
        {% endif %}

        <main class="space-y-6">
            {% if results %}
                {% for r in results %}
                <article class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 hover:shadow-md transition">
                    <header>
                        <cite class="text-xs text-emerald-700 not-italic block mb-1 truncate">{{ r.href }}</cite>
                        <h2 class="text-xl font-bold text-indigo-800 hover:underline">
                            <a href="{{ r.href }}" target="_blank" rel="noopener noreferrer">{{ r.title }}</a>
                        </h2>
                    </header>
                    <p class="mt-2 text-slate-600 text-sm leading-relaxed">{{ r.body }}</p>
                </article>
                {% endfor %}
            {% elif query and not error %}
                <div class="text-center py-20">
                    <p class="text-slate-400 text-lg">結果が見つかりませんでした。キーワードを変えてみてください。</p>
                </div>
            {% endif %}
        </main>

        <footer class="mt-20 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
            <p>&copy; 2026 woolisbest-4520. Powered by DuckDuckGo.</p>
        </footer>
    </div>
</body>
</html>
