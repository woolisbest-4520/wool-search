<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Search Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto pt-10 px-4">
        <h1 class="text-3xl font-bold text-blue-600 mb-8 text-center">MySearch</h1>
        <form action="/search" method="post" class="mb-10">
            <div class="flex gap-2">
                <input type="text" name="q" value="{{ query if query else '' }}" 
                       class="flex-1 p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500" 
                       placeholder="検索ワードを入力..." required>
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">検索</button>
            </div>
        </form>

        {% if results %}
            <div class="space-y-8">
                {% for r in results %}
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                    <a href="{{ r.href }}" class="text-sm text-green-700 truncate block mb-1">{{ r.href }}</a>
                    <a href="{{ r.href }}" class="text-xl text-blue-800 hover:underline font-semibold block mb-2">{{ r.title }}</a>
                    <p class="text-gray-600 text-sm leading-relaxed">{{ r.body }}</p>
                </div>
                {% endfor %}
            </div>
        {% elif query %}
            <p class="text-center text-gray-500">結果が見つかりませんでした。</p>
        {% endif %}
    </div>
</body>
</html>
